<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clustering FME chauves-souris</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Clustering FME</h1>
          <p>Analyse locale des fichiers DATA*.TXT</p>
        </div>
        <label class="upload">
          <input id="fileInput" type="file" accept=".txt,.TXT,text/plain">
          <span>Choisir un fichier</span>
        </label>
      </header>

      <section class="workspace">
        <aside class="panel controls" aria-label="Parametres">
          <h2>Parametres</h2>

          <label class="field">
            <span>FME minimale <strong id="fmeMinKhzValue"></strong></span>
            <input id="fmeMinKhz" type="range" min="5" max="60" step="0.5">
          </label>

          <label class="field">
            <span>Gap sequence <strong id="sequenceGapMsValue"></strong></span>
            <input id="sequenceGapMs" type="range" min="20" max="500" step="5">
          </label>

          <label class="field">
            <span>Gap echo <strong id="echoGapMsValue"></strong></span>
            <input id="echoGapMs" type="range" min="1" max="50" step="1">
          </label>

          <label class="field">
            <span>Delta FME echo <strong id="echoFmeBinsValue"></strong></span>
            <input id="echoFmeBins" type="range" min="0" max="8" step="0.25">
          </label>

          <label class="field">
            <span>Bande passante</span>
            <select id="bandwidthMethod">
              <option value="scott">Scott</option>
              <option value="silverman">Silverman</option>
            </select>
          </label>

          <label class="field">
            <span>Echelle bandwidth <strong id="bandwidthScaleValue"></strong></span>
            <input id="bandwidthScale" type="range" min="0.45" max="2.5" step="0.05">
          </label>

          <label class="field">
            <span>Prominence pics <strong id="peakProminenceRatioValue"></strong></span>
            <input id="peakProminenceRatio" type="range" min="0.01" max="0.25" step="0.005">
          </label>

          <label class="field">
            <span>Histogramme <strong id="histogramBinsValue"></strong></span>
            <input id="histogramBins" type="range" min="30" max="150" step="5">
          </label>
        </aside>

        <section class="mainarea">
          <div id="status" class="status" data-tone="neutral">Charge un fichier DATA*.TXT pour demarrer.</div>

          <div id="emptyState" class="empty">
            <p>Le fichier reste dans le navigateur. Aucun envoi reseau n'est effectue.</p>
          </div>

          <div id="results" hidden>
            <section class="panel chart-panel">
              <canvas id="chart" aria-label="Histogramme, KDE et GMM"></canvas>
            </section>

            <section class="panel summary">
              <div>
                <h2>Resume</h2>
                <div id="statsGrid" class="stats-grid"></div>
              </div>
              <div class="notes">
                <p><span>Pics KDE</span><strong id="peaksText"></strong></p>
                <p><span>Seuils GMM</span><strong id="thresholdsText"></strong></p>
              </div>
            </section>

            <section class="panel">
              <h2>Clusters</h2>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Label</th>
                      <th>n</th>
                      <th>%</th>
                      <th>Espece probable</th>
                      <th>Mediane kHz</th>
                      <th>Moyenne kHz</th>
                      <th>Sigma kHz</th>
                      <th>Poids</th>
                    </tr>
                  </thead>
                  <tbody id="clusterBody"></tbody>
                </table>
              </div>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script src="parser.js"></script>
    <script src="preprocessing.js"></script>
    <script src="clustering.js"></script>
    <script src="charts.js"></script>
    <script src="app.js"></script>
  </body>
</html>
